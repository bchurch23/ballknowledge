name: One Time Pool Build
on: workflow_dispatch
permissions:
  contents: write
jobs:
  build-pool:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
      - name: Install R packages
        run: Rscript -e 'install.packages(c("httr", "jsonlite"))'
      - name: Run pool build
        run: Rscript build_players_pool.R
      - name: Run daily build
        run: Rscript generate_daily_data.R
      - name: Commit files
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add players_full.json today.json players.json
          git commit -m "Initial pool and daily data build"
          git push
